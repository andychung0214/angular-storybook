<link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: "Rajdhani", "Segoe UI", sans-serif;
  color: #e6ffef;
  background:
    radial-gradient(circle at 12% 10%, rgba(40, 177, 101, 0.2) 0%, transparent 36%),
    radial-gradient(circle at 88% 90%, rgba(19, 103, 57, 0.24) 0%, transparent 34%),
    linear-gradient(140deg, #010a06 0%, #062315 42%, #041a10 100%);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(95, 216, 148, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(95, 216, 148, 0.06) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: -1;
}

storybook-dynamic-app-root {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  height: 100%;
  padding: 24px;
}

storybook-dynamic-app-root > ng-component {
  margin: 0 auto;
  width: 100%;
}

.sbdocs,
.sbdocs-wrapper,
.sbdocs-content {
  color: #e6ffef !important;
  font-family: "Rajdhani", "Segoe UI", sans-serif !important;
}

.sbdocs-preview,
.docs-story {
  border: 1px solid rgba(95, 216, 148, 0.32) !important;
  border-radius: 12px;
  background: linear-gradient(150deg, rgba(9, 50, 31, 0.94) 0%, rgba(5, 24, 15, 0.98) 90%) !important;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(95, 216, 148, 0.2), inset 0 0 24px rgba(95, 216, 148, 0.08) !important;
}

.sbdocs h1,
.sbdocs h2,
.sbdocs h3,
.sbdocs h4,
.sbdocs h5,
.sbdocs h6 {
  font-family: "Orbitron", "Rajdhani", sans-serif !important;
  letter-spacing: 0.04em;
}

.sbdocs code,
.sbdocs pre {
  background: rgba(2, 18, 10, 0.8) !important;
  border: 1px solid rgba(95, 216, 148, 0.3) !important;
  color: #baf8d2 !important;
}

.sb-theme-panel {
  border: 1px solid rgba(95, 216, 148, 0.32);
  border-radius: 12px;
  padding: 14px;
  margin: 0 0 16px;
  background: linear-gradient(145deg, rgba(9, 50, 31, 0.94) 0%, rgba(5, 24, 15, 0.98) 100%);
  box-shadow: 0 10px 22px rgba(0, 0, 0, 0.33), inset 0 0 18px rgba(95, 216, 148, 0.1);
}

.sb-theme-panel h4 {
  margin: 0 0 10px;
  font-family: "Orbitron", "Rajdhani", sans-serif;
  letter-spacing: 0.04em;
  font-size: 14px;
}

.sb-theme-meta {
  margin-bottom: 10px;
  color: #baf8d2;
  font-weight: 600;
}

.sb-theme-token-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 8px;
}

.sb-theme-token-item {
  border: 1px solid rgba(95, 216, 148, 0.22);
  border-radius: 8px;
  padding: 6px 8px;
  background: rgba(4, 18, 12, 0.56);
}

.sb-theme-token-name {
  font-size: 11px;
  opacity: 0.85;
}

.sb-theme-token-value {
  font-size: 12px;
  color: #e6ffef;
}
</style>
<script>
(() => {
  const TOKENS = [
    "--forest-950",
    "--forest-900",
    "--forest-700",
    "--forest-500",
    "--forest-300",
    "--text-main",
    "--text-muted",
    "--line",
    "--surface"
  ];

  const NAME_MAP = {
    "theme-forest": "森林綠",
    "theme-london-blue": "倫敦藍",
    "theme-wine": "酒紅色",
    "theme-luxury-gold": "奢華金"
  };

  const getThemeClass = () => {
    const all = ["theme-forest", "theme-london-blue", "theme-wine", "theme-luxury-gold"];
    return all.find((name) => document.documentElement.classList.contains(name)) || "theme-forest";
  };

  const createPanelIfNeeded = () => {
    const docsRoot = document.querySelector(".sbdocs-wrapper, .sbdocs-content, .sbdocs");
    if (!docsRoot) {
      return null;
    }

    let panel = document.getElementById("sb-theme-panel");
    if (!panel) {
      panel = document.createElement("section");
      panel.id = "sb-theme-panel";
      panel.className = "sb-theme-panel";
      panel.innerHTML = `
        <h4>Theme Inspector</h4>
        <div class="sb-theme-meta" id="sb-theme-meta"></div>
        <div class="sb-theme-token-grid" id="sb-theme-token-grid"></div>
      `;
      docsRoot.prepend(panel);
    }

    return panel;
  };

  const renderThemePanel = () => {
    const panel = createPanelIfNeeded();
    if (!panel) {
      return;
    }

    const meta = panel.querySelector("#sb-theme-meta");
    const grid = panel.querySelector("#sb-theme-token-grid");
    if (!meta || !grid) {
      return;
    }

    const themeClass = getThemeClass();
    const themeName = NAME_MAP[themeClass] || "森林綠";
    const styles = getComputedStyle(document.documentElement);

    meta.textContent = `目前主題: ${themeName} (${themeClass})`;
    grid.innerHTML = TOKENS.map((token) => {
      const value = styles.getPropertyValue(token).trim() || "(empty)";
      return `
        <div class="sb-theme-token-item">
          <div class="sb-theme-token-name">${token}</div>
          <div class="sb-theme-token-value">${value}</div>
        </div>
      `;
    }).join("");
  };

  const observer = new MutationObserver(() => {
    renderThemePanel();
  });

  const start = () => {
    renderThemePanel();
    observer.observe(document.documentElement, { attributes: true, subtree: true, childList: true, attributeFilter: ["class"] });
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();
</script>
