<!-- src/app/components/radio/radio.component.html -->
<label class="radio-container">
  {{label}}
  <input type="radio" [name]="name" [value]="value" [checked]="checked" [disabled]="isDisable" (change)="onChange()" [style]="{'backgound-color': backgroundColor}">
  <span class="checkmark"></span>
</label>
